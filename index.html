<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wild Rift BP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/Wild_Rift_icon.png">
</head>
<body>

<!-- ==================== ADD HERO SCREEN (default) ==================== -->
<div id="add-screen" class="screen active">
  <div class="screen-header">
    <img src="assets/Wild_Rift_icon_2.png" class="nav-logo" alt="Wild Rift">
    <div class="title-box">
      <h2>WILDRIFT<span class="title-sep"></span>BP</h2>
      <p class="title-desc">点击英雄可以加入自己的英雄池，查看特性来补阵容缺陷，克制关系BP避免对位压制/实现压制</p>
    </div>
    <span class="title-version">游戏版本：7.1a &nbsp; 最新英雄：奎桑提 &nbsp; Author: 长风, 梨花</span>
    <label id="local-data-toggle" class="local-data-toggle hidden" title="仅本地开发环境可见">
      <input type="checkbox" id="use-personal-data-toggle">
      <span>使用个人数据</span>
    </label>
  </div>
  <div class="lane-tabs">
    <button class="lane-tab active" id="lane-all"     onclick="switchAddLane('all')">全部</button>
    <button class="lane-tab"        id="lane-baron"   onclick="switchAddLane('baron')">上单</button>
    <button class="lane-tab"        id="lane-jungle"  onclick="switchAddLane('jungle')">打野</button>
    <button class="lane-tab"        id="lane-mid"     onclick="switchAddLane('mid')">中单</button>
    <button class="lane-tab"        id="lane-adc"     onclick="switchAddLane('adc')">射手</button>
    <button class="lane-tab"        id="lane-support" onclick="switchAddLane('support')">辅助</button>
  </div>
  <div id="keyword-chips" class="keyword-chips"></div>
  <div id="kw-add-panel" class="kw-add-panel hidden">
    <div class="kw-create-row">
      <input type="text" id="kw-create-input" class="kw-create-input" placeholder="输入新词条名称..."
             onkeydown="if(event.key==='Enter')createKeyword()">
      <button class="kw-create-btn" onclick="createKeyword()">创建</button>
    </div>
  </div>
  <div class="search-wrap">
    <input
      type="text"
      id="add-search"
      placeholder="搜索英雄 / 词条..."
      oninput="onAddSearch()"
    >
    <button class="btn-clear-search" id="btn-clear-search" onclick="clearAddSearch()" title="清除搜索">✕</button>
  </div>
  <div id="add-selected-label" class="add-selected-label hidden">我的英雄池</div>
  <div id="add-grid" class="champ-grid"></div>
</div>

<!-- ==================== POOL SCREEN ==================== -->
<div id="pool-screen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('add-screen')">← 返回</button>
  </div>

  <!-- Champion view (all / jungle) -->
  <div id="view-champions" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="search-wrap">
      <input
        type="text"
        id="pool-search"
        placeholder="搜索英雄 / 词条（如：肉、针对、收割）..."
        oninput="renderPoolGrid()"
      >
    </div>
    <div id="pool-grid" class="champ-grid"></div>
  </div>

</div>

<!-- ==================== EDIT MODAL ==================== -->
<div id="edit-modal" class="hidden">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-champ">
        <img id="modal-champ-img" src="" alt="">
        <span class="modal-champ-name" id="modal-champ-name"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-label">词条 · Tags</div>
        <div id="modal-tags" class="tags-list"></div>
        <div class="input-row">
          <input type="text" id="tag-input" placeholder="添加词条...">
          <button class="btn-add" onclick="addTag()">添加</button>
        </div>
      </div>
      <div>
        <div class="modal-section-label">克制英雄（此英雄克制以下敌方）</div>
        <div id="modal-counters" class="counters-list"></div>
        <div class="counter-search-wrap">
          <div class="input-row">
            <input type="text" id="counter-input" placeholder="搜索被克制的英雄..." oninput="renderCounterDropdown()">
          </div>
          <div id="counter-dropdown" class="counter-dropdown"></div>
        </div>
      </div>
      <div>
        <div class="modal-section-label">打野标记</div>
        <div class="jungle-row">
          <span class="jungle-label">标记为打野</span>
          <div id="jungler-track" class="toggle-track" onclick="toggleJungler()">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
      <div>
        <button class="btn-danger" onclick="removeFromPool()">从英雄池移除</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== TOOLTIP ==================== -->
<div id="tooltip" class="hidden"></div>

<script src="js/champions-data.js"></script>
<script src="js/user-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
