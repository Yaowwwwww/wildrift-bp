<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_title">Wild Rift Picking System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/Wild_Rift_icon.png">
</head>
<body>

<!-- ==================== ADD HERO SCREEN (default) ==================== -->
<div id="add-screen" class="screen active">
  <div class="screen-header">
    <img src="assets/Wild_Rift_icon_2.png" class="nav-logo" alt="Wild Rift">
    <div class="title-box">
      <h2>WILDRIFT<span class="title-sep"></span>PICKING SYSTEM</h2>
      <p class="title-desc" data-i18n="title_desc">点击英雄可以加入自己的英雄池，查看特性来补阵容缺陷，克制关系BP避免对位压制/实现压制</p>
    </div>
    <span class="title-version" data-i18n="title_version">游戏版本：7.1a &nbsp; 最新英雄：奎桑提 &nbsp; Author: 长风, 梨花</span>
    <div class="header-right">
      <button id="lang-toggle" class="lang-toggle" onclick="toggleLanguage()" type="button" aria-label="Switch language">
        <span class="lang-label lang-label-en">EN</span>
        <span class="lang-track"><span class="lang-knob"><span class="lang-flag lang-flag-en">🇺🇸</span><span class="lang-flag lang-flag-cn">🇨🇳</span></span></span>
        <span class="lang-label lang-label-cn">CN</span>
      </button>
    </div>
  </div>
  <div class="lane-tabs">
    <button class="lane-tab active" id="lane-all"     onclick="switchAddLane('all')"     data-i18n="lane_all">全部</button>
    <button class="lane-tab"        id="lane-baron"   onclick="switchAddLane('baron')"   data-i18n="lane_baron">上单</button>
    <button class="lane-tab"        id="lane-jungle"  onclick="switchAddLane('jungle')"  data-i18n="lane_jungle">打野</button>
    <button class="lane-tab"        id="lane-mid"     onclick="switchAddLane('mid')"     data-i18n="lane_mid">中单</button>
    <button class="lane-tab"        id="lane-adc"     onclick="switchAddLane('adc')"     data-i18n="lane_adc">射手</button>
    <button class="lane-tab"        id="lane-support" onclick="switchAddLane('support')" data-i18n="lane_support">辅助</button>
  </div>
  <div id="keyword-chips" class="keyword-chips"></div>
  <div id="kw-add-panel" class="kw-add-panel hidden">
    <div class="kw-create-row">
      <input type="text" id="kw-create-input" class="kw-create-input" data-i18n-ph="kw_create_ph" placeholder="输入新词条名称..."
             onkeydown="if(event.key==='Enter')createKeyword()">
      <button class="kw-create-btn" onclick="createKeyword()" data-i18n="btn_create">创建</button>
    </div>
  </div>
  <div class="search-wrap">
    <input
      type="text"
      id="add-search"
      data-i18n-ph="search_ph"
      placeholder="搜索英雄 / 词条..."
      oninput="onAddSearch()"
    >
    <button class="btn-clear-search" id="btn-clear-search" onclick="clearAddSearch()" data-i18n-title="clear_search" title="清除搜索">✕</button>
  </div>
  <div class="tagline-wrap">
    <span class="tagline-line"></span>
    <span class="tagline-text" data-i18n="tagline">根据你的理解修改出属于自己的BP宝典！</span>
    <span class="tagline-line"></span>
  </div>
  <div id="add-selected-label" class="add-selected-label hidden" data-i18n="my_pool">我的英雄池</div>
  <div id="add-grid" class="champ-grid"></div>
  <button id="back-to-top" class="back-to-top is-hidden" onclick="scrollAddGridToTop()" data-i18n-title="back_to_top" title="回到顶部">↑</button>
</div>

<!-- ==================== POOL SCREEN ==================== -->
<div id="pool-screen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="showScreen('add-screen')" data-i18n="btn_back">← 返回</button>
  </div>

  <!-- Champion view (all / jungle) -->
  <div id="view-champions" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="search-wrap">
      <input
        type="text"
        id="pool-search"
        data-i18n-ph="pool_search_ph"
        placeholder="搜索英雄 / 词条（如：肉、针对、收割）..."
        oninput="renderPoolGrid()"
      >
    </div>
    <div id="pool-grid" class="champ-grid"></div>
  </div>

</div>

<!-- ==================== EDIT MODAL ==================== -->
<div id="edit-modal" class="hidden">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-champ">
        <img id="modal-champ-img" src="" alt="">
        <span class="modal-champ-name" id="modal-champ-name"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-label" data-i18n="tags_label">词条 · Tags</div>
        <div id="modal-tags" class="tags-list"></div>
        <div class="input-row">
          <input type="text" id="tag-input" data-i18n-ph="add_tag_ph" placeholder="添加词条...">
          <button class="btn-add" onclick="addTag()" data-i18n="btn_add">添加</button>
        </div>
      </div>
      <div>
        <div class="modal-section-label" data-i18n="counters_label">克制英雄（此英雄克制以下敌方）</div>
        <div id="modal-counters" class="counters-list"></div>
        <div class="counter-search-wrap">
          <div class="input-row">
            <input type="text" id="counter-input" data-i18n-ph="counter_search_ph" placeholder="搜索被克制的英雄..." oninput="renderCounterDropdown()">
          </div>
          <div id="counter-dropdown" class="counter-dropdown"></div>
        </div>
      </div>
      <div>
        <div class="modal-section-label" data-i18n="jungle_mark_label">打野标记</div>
        <div class="jungle-row">
          <span class="jungle-label" data-i18n="mark_as_jungler">标记为打野</span>
          <div id="jungler-track" class="toggle-track" onclick="toggleJungler()">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
      <div>
        <button class="btn-danger" onclick="removeFromPool()" data-i18n="remove_from_pool">从英雄池移除</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== TOOLTIP ==================== -->
<div id="tooltip" class="hidden"></div>

<script src="js/champions-data.js"></script>
<script src="js/user-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
